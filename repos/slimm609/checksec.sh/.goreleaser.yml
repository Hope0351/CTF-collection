version: 2
project_name: checksec

release:
  prerelease: auto

env:
  - DOCKER_CLI_EXPERIMENTAL=enabled
  - CGO_ENABLED=0
  - GOCACHE=/tmp/gocache-checksec

builds:
  - id: core
    binary: checksec
    main: ./main.go
    buildmode: "pie"
    ldflags:
      - -s -w
      - -X "main.version={{ .Version }}"
      - -X "main.commit={{ .Commit }}"
      - -X "main.date={{ .Date }}"
      - -extldflags "-Wl,-z,relro,-z,now,-z,noexecstack"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

sboms:
- id: checksec
  documents:
    - "${artifact}-{{ .Os }}-{{ .Arch }}.spdx.sbom.json"
  cmd: syft
  args: ["${artifact}", "--output", "cyclonedx-json=${document}"]
  artifacts: binary

nfpms:
  - id: linux-packages
    builds:
      - core
    formats:
      - rpm
      - deb
      - apk
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    vendor: checksec
    maintainer: Brian Davis <maintainers@checksec.invalid>
    homepage: https://github.com/slimm609/checksec
    description: Security feature auditing for ELF binaries and Linux kernels.
    license: BSD-3-Clause
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/checksec/LICENSE
      - src: extras/man/checksec.1
        dst: /usr/share/man/man1/checksec.1
    rpm:
      summary: Security feature auditing for ELF binaries and Linux kernels

checksum:
  name_template: "{{ .ProjectName }}_checksums.sha512"
  algorithm: sha512

# Keyless cosign signing of the checksums file. The checksums file covers every
# released artifact (sha512), so signing it authenticates the whole release.
# Runs in GitHub Actions, where cosign obtains a short-lived certificate from
# Fulcio via the workflow's OIDC identity and records the signature in Rekor.
# Produces checksec_checksums.sha512.sig and checksec_checksums.sha512.pem.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

report_sizes: true
