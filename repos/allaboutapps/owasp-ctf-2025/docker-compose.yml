version: "3.8"

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - injection-app
      - access-app
      - crypto-app
      - ssrf-app
    networks:
      - ctf-network
    restart: unless-stopped

  # App 1: Injection Vulnerabilities (SQL Injection, XSS, Command Injection)
  injection-app:
    build: ./app1-injection
    environment:
      - DB_HOST=mysql
      - DB_USER=ctf_user
      - DB_PASSWORD=vulnerable123
      - DB_NAME=injection_db
      - FLAG_A03=CTF{1nj3ct10n_m4st3r_2025}
    depends_on:
      - mysql
    networks:
      - ctf-network
    restart: unless-stopped

  # App 2: Broken Access Control
  access-app:
    build: ./app2-access
    environment:
      - DB_HOST=postgres
      - DB_USER=ctf_user
      - DB_PASSWORD=insecure456
      - DB_NAME=access_db
    depends_on:
      - postgres
    networks:
      - ctf-network
    restart: unless-stopped

  # App 3: Cryptographic Failures
  crypto-app:
    build: ./app3-crypto
    environment:
      - FLAG_A02=CTF{cr4pt0_f41lur3_3xp0s3d_2025}
      - WEAK_ENCRYPTION_KEY=1234567890123456
    networks:
      - ctf-network
    restart: unless-stopped

  # App 4: SSRF and Security Misconfiguration
  ssrf-app:
    build: ./app4-ssrf
    environment:
      - INTERNAL_API_KEY=internal_secret_api_key_789
    networks:
      - ctf-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword123
      - MYSQL_DATABASE=injection_db
      - MYSQL_USER=ctf_user
      - MYSQL_PASSWORD=vulnerable123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./databases/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ctf-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=access_db
      - POSTGRES_USER=ctf_user
      - POSTGRES_PASSWORD=insecure456
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ctf-network
    restart: unless-stopped

  # Flag Server (Internal service containing flags)
  flag-server:
    build: ./flag-server
    networks:
      - ctf-network
    restart: unless-stopped

networks:
  ctf-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
