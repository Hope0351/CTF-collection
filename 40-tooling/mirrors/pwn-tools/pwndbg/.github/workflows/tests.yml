name: Tests
on:
  push:
    branches:
      - dev
  pull_request:

concurrency:
  # PRs: cancel in-progress runs (only test latest)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Use dorny/paths-filter instead of on.paths so that skipped jobs report
  # as passed to branch protection, allowing docs-only PRs to merge.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!mkdocs.yml'
              - '!docs/**'
              - '!*.md'

  tests-using-nix:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        type: [qemu-user-tests, qemu-system-tests, tests, unit-tests]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      TMPDIR: /tmp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install dependencies
        run: |
          ./setup-dev.sh --install-only

      - name: install uv
        run: nix profile install --inputs-from . nixpkgs#uv

      - name: Build pwndbg
        run: |
          nix build '.#pwndbg-dev' --accept-flake-config -o result

      # We set `kernel.yama.ptrace_scope=0` for `attachp` command tests
      - name: Setup
        run: |
          sudo sysctl -w kernel.yama.ptrace_scope=0

      - name: Run tests
        if: matrix.type == 'unit-tests'
        run: |
          ./unit-tests.sh

      - name: Run GDB Tests
        if: matrix.type == 'tests'
        run: |
          ./tests.sh --nix -d gdb -g gdb

      - name: Run DBG Tests on GDB
        if: matrix.type == 'tests'
        run: |
          ./tests.sh --nix -d gdb -g dbg

      - name: Run cross-arch tests
        if: matrix.type == 'qemu-user-tests'
        run: |
          ./tests.sh --nix -d gdb -g cross-arch-user

      - name: Set up cache for QEMU images
        if: matrix.type == 'qemu-system-tests'
        id: qemu-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./tests/library/qemu-system/kimages
          key: ${{ matrix.os }}-cache-qemu-images

      - name: Download QEMU images
        if: matrix.type == 'qemu-system-tests'
        run: |
          # Would happen in the next step as well, but this way
          # it looks nicer in the CI.
          ./tests/library/qemu_system/download-kernel-images.sh

      - name: Run kernel tests
        if: matrix.type == 'qemu-system-tests'
        run: |
          ./kernel-tests.sh --nix

  qemu-system-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: [ubuntu-22.04]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache for pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ matrix.os }}-cache-pip

      - name: Setup pwndbg
        run: |
          ./setup.sh
          ./setup-dev.sh

      - name: Set up cache for QEMU images
        id: qemu-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./tests/library/qemu-system/kimages
          key: ${{ matrix.os }}-cache-qemu-images

      - name: Download images
        run: |
          ./tests/library/qemu_system/download-kernel-images.sh

      # We set `kernel.yama.ptrace_scope=0` for `gdb-pt-dump`
      - name: Run kernel tests
        run: |
          sudo sysctl -w kernel.yama.ptrace_scope=0
          ./kernel-tests.sh
