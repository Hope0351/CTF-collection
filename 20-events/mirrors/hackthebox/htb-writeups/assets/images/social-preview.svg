  <text x="170" y="200" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="#ffffff">HTB Writeups</text>
  <!-- Subtitle -->
  <text x="100" y="270" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="#a4b1cd">The Ultimate Hack The Box Resource</text>
  <!-- Stats -->
  <g transform="translate(100, 330)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="none" stroke="#9fef00" stroke-opacity="0.3"/>
