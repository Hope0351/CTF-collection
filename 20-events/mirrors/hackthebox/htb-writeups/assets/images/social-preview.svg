    <text x="830" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">SQLi</text>
    <circle cx="1000" cy="400" r="15" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <text x="1000" y="404" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">ADCS</text>
    <circle cx="1180" cy="220" r="15" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <text x="1180" y="224" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">XSS</text>
    <circle cx="850" cy="300" r="15" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <text x="850" y="304" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">SSRF</text>
    <line x1="843" y1="140" x2="870" y2="180" stroke="#1a3a5c" stroke-width="1"/>
    <line x1="985" y1="390" x2="965" y2="365" stroke="#1a3a5c" stroke-width="1"/>
    <line x1="1167" y1="228" x2="1125" y2="290" stroke="#1a3a5c" stroke-width="1"/>
    <line x1="863" y1="295" x2="910" y2="230" stroke="#1a3a5c" stroke-width="1"/>
