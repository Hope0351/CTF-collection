    <line x1="935" y1="215" x2="1020" y2="155" stroke="#2a3a4e" stroke-width="1"/>
    <line x1="1070" y1="180" x2="1095" y2="272" stroke="#2a3a4e" stroke-width="1"/>
    <line x1="1075" y1="310" x2="970" y2="340" stroke="#2a3a4e" stroke-width="1"/>
    <line x1="930" y1="235" x2="940" y2="330" stroke="#2a3a4e" stroke-width="1"/>
