    <text x="80" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a4b1cd">MACHINES</text>
  </g>
  <g transform="translate(180, 330)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="none" stroke="#9fef00" stroke-opacity="0.3"/>
    <text x="80" y="28" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#9fef00">400+</text>
    <text x="80" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a4b1cd">CHALLENGES</text>
  </g>
  <g transform="translate(360, 330)">
