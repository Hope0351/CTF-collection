title: HTB Writeups
description: "The most comprehensive Hack The Box writeup collection - 500+ machines, 400+ challenges, ProLabs, Sherlocks, CTF events, cheatsheets, and OSCP/CPTS/CRTO certification prep."
url: "https://momenbasel.github.io"
baseurl: "/htb-writeups"

theme: just-the-docs

color_scheme: dark

logo: "/assets/images/logo.svg"

search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/
search.rel_url: true
search.button: true

heading_anchors: true

mermaid:
  version: "10.9.0"

plugins:
  - jekyll-include-cache

aux_links:
  "GitHub":
    - "https://github.com/momenbasel/htb-writeups"
  "Machine Finder":
    - "https://momenbasel.github.io/htb-writeups/finder/"
  "Knowledge Graph":
    - "https://momenbasel.github.io/htb-writeups/graph/"

aux_links_new_tab: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Copyright &copy; 2026 <a href="https://github.com/momenbasel">Moamen Basel</a>. Distributed under the <a href="https://github.com/momenbasel/htb-writeups/blob/main/LICENSE">MIT License</a>.'

# Custom head content for extra CSS
head_extra: |
  <link rel="stylesheet" href="/htb-writeups/assets/css/custom.css">

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Exclude files from the site
exclude:
  - "0xdf-htb-machines.json"
  - "0xdf-htb-machines.md"
  - "ippsec-video-index.json"
  - "ippsec-video-index.md"
  - ".markdownlint.json"
  - "CONTRIBUTING.md"
  - "templates/"
  - "node_modules/"
  - "Gemfile"
  - "Gemfile.lock"

defaults:
  - scope:
      path: ""
    values:
      layout: default
