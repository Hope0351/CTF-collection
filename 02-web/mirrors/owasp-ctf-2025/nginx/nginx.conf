events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Security headers (intentionally weak for CTF)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Rate limiting (intentionally permissive)
    limit_req_zone $binary_remote_addr zone=one:10m rate=100r/m;
    
    upstream injection-app {
        server injection-app:5001;
    }
    
    upstream access-app {
        server access-app:5003;
    }
    
    upstream crypto-app {
        server crypto-app:5004;
    }
    
    upstream ssrf-app {
        server ssrf-app:5005;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # Main landing page
        location / {
            return 200 '<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OWASP Top 10 CTF Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #d32f2f; text-align: center; }
        .challenge { margin: 20px 0; padding: 15px; border-left: 4px solid #2196f3; background: #f8f9fa; }
        .challenge h3 { margin-top: 0; color: #1976d2; }
        a { color: #1976d2; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .warning { background: #fff3cd; border-left-color: #ffc107; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ OWASP Top 10 CTF Challenge</h1>
        <div class="challenge warning">
            <h3>⚠️ Warning</h3>
            <p>This is a vulnerable application designed for educational purposes. Do not deploy in production!</p>
        </div>
        
        <div class="challenge">
            <h3>A01 & A03: Injection Vulnerabilities</h3>
            <p>SQL Injection, XSS, Command Injection challenges</p>
            <a href="/injection/">Start Challenge →</a>
        </div>
        
        
        <div class="challenge">
            <h3>A01: Broken Access Control</h3>
            <p>Authorization bypass and privilege escalation</p>
            <a href="/access/">Start Challenge →</a>
        </div>
        
        <div class="challenge">
            <h3>A02: Cryptographic Failures</h3>
            <p>Weak encryption and data exposure</p>
            <a href="/crypto/">Start Challenge →</a>
        </div>
        
        <div class="challenge">
            <h3>A05 & A10: SSRF and Misconfigurations</h3>
            <p>Server-Side Request Forgery and security misconfigurations</p>
            <a href="/ssrf/">Start Challenge →</a>
        </div>
        
        <div class="challenge">
            <h3>🎯 Objective</h3>
            <p>Find and exploit vulnerabilities to capture flags in the format: <code>CTF{...}</code></p>
        </div>
    </div>
</body>
</html>';
            add_header Content-Type text/html;
        }
        
        # Injection app
        location /injection/ {
            proxy_pass http://injection-app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Access control app
        location /access/ {
            proxy_pass http://access-app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Crypto app
        location /crypto/ {
            proxy_pass http://crypto-app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # SSRF app
        location /ssrf/ {
            proxy_pass http://ssrf-app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Admin endpoint (intentionally exposed)
        location /admin {
            return 200 '{"message": "Admin interface disabled", "hint": "Try other paths"}';
            add_header Content-Type application/json;
        }
    }
} 